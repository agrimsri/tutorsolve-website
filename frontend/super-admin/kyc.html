      <main class="dashboard-main">

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/utils.js"></script>
    <script>
      if (!requireRole("super_admin")) throw new Error("Abort");
      document.querySelector('[data-page="kyc"]')?.classList.add("active");

      async function loadKYC() {
        const res = await apiFetch("/superadmin/experts/pending");
        const experts = await res.json();
        const list = document.getElementById("kyc-list");

        if (!experts.length) {
          list.innerHTML = `<div class="empty-state"><h3>No pending applications</h3><p>All expert applications have been reviewed.</p></div>`;
          return;
        }

        list.innerHTML = experts
          .map((e) => {
            const apiHost = API_BASE.replace("/api", "");
            let docsHTML = "";

            if (e.cv_url) {
              docsHTML += `<a href="${e.cv_url}" target="_blank" class="btn btn-secondary btn-sm">📄 View CV</a>`;
            } else {
              docsHTML += `<span style="font-size:13px;color:var(--color-gray-500)">No CV uploaded</span>`;
            }

            if (e.id_proof_url) {
              docsHTML += `<a href="${e.id_proof_url}" target="_blank" class="btn btn-secondary btn-sm">🪪 View ID Proof</a>`;
            } else {
              docsHTML += `<span style="font-size:13px;color:var(--color-gray-500)">No ID uploaded</span>`;
            }

            return `
      <div class="card kyc-card" id="kyc-${e._id}">
        <div class="kyc-card-header">
          <div>
            <h3 class="kyc-name">${escapeHtml(e.name)}</h3>
            <p style="font-size:13px;color:var(--color-gray-500);margin-top:var(--space-1)">
              ${escapeHtml(e.email)} · Domain: <strong>${escapeHtml(e.domain)}</strong>
            </p>
          </div>
          <div style="display:flex;gap:var(--space-3)">
            <button class="btn btn-primary btn-sm"
              onclick="handleKYC('${e._id}', 'approve', this)">
              ✓ Approve
            </button>
            <button class="btn btn-secondary btn-sm"
              onclick="handleKYC('${e._id}', 'reject', this)">
              ✗ Reject
            </button>
          </div>
        </div>

        <!-- Document links -->
        <div class="kyc-docs">
          ${docsHTML}
        </div>
      </div>
    `;
          })
          .join("");
      }

      async function handleKYC(expertId, action, btn) {
        btn.disabled = true;
        btn.textContent = "Processing...";

        const endpoint =
          action === "approve"
            ? `/superadmin/experts/${expertId}/approve`
            : `/superadmin/experts/${expertId}/reject`;

        const res = await apiFetch(endpoint, { method: "POST" });
        if (res.ok) {
          document.getElementById(`kyc-${expertId}`)?.remove();
          toast(
            `Expert ${action === "approve" ? "approved" : "rejected"} successfully.`,
            action === "approve" ? "success" : "warning",
          );

          // Show empty state if no more cards
          if (!document.querySelector(".kyc-card")) {
            document.getElementById("kyc-list").innerHTML =
              `<div class="empty-state"><h3>All caught up!</h3><p>No pending applications.</p></div>`;
          }
        } else {
          btn.disabled = false;
          btn.textContent = action === "approve" ? "✓ Approve" : "✗ Reject";
          toast("Action failed. Try again.", "error");
        }
      }

      loadKYC();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/js/notifications.js"></script>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users — TutorSolve</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/super-admin.css" />
  </head>

  <body>
    <div class="dashboard-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <img src="/assets/logo.svg" alt="TutorSolve" width="28" />
          <span class="navbar-logo-text">TutorSolve</span>
        </div>

        <nav class="sidebar-nav">
          <p class="sidebar-section-label">Overview</p>
          <a

            data-page="dashboard"
          >
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <rect x="1" y="1" width="6" height="6" rx="1" />
              <rect x="9" y="1" width="6" height="6" rx="1" />
              <rect x="1" y="9" width="6" height="6" rx="1" />
              <rect x="9" y="9" width="6" height="6" rx="1" />
            </svg>
            Dashboard
          </a>

          <p class="sidebar-section-label" style="margin-top: var(--space-4)">
            Finance
          </p>
          <a
            href="/super-admin/financials.html"
            class="sidebar-item"
            data-page="financials"
          >
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M8 2v12M5 5h4.5a2.5 2.5 0 010 5H5M5 7h5" />
            </svg>
            Financials
          </a>

          <p class="sidebar-section-label" style="margin-top: var(--space-4)">
            Operations
          </p>
          <a href="/super-admin/kyc.html" class="sidebar-item" data-page="kyc">
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <rect x="2" y="2" width="12" height="12" rx="2" />
              <path d="M5 8h6M5 5h6M5 11h4" />
            </svg>
            KYC Queue
          </a>
          <a
            href="/super-admin/users.html"
            class="sidebar-item"
            data-page="users"
          >
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <circle cx="6" cy="5" r="3" />
              <path d="M1 13c0-2.761 2.239-5 5-5" />
              <path d="M11 8v6M14 11H8" />
            </svg>
            Users
          </a>
          <a
            href="/super-admin/chat-spy.html"
            class="sidebar-item"
            data-page="chat-spy"
          >
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z" />
              <circle cx="8" cy="8" r="2" />
            </svg>
            Chat Spy
          </a>
          <a
            href="/super-admin/profile.html"
            class="sidebar-item"
            data-page="profile"
          >
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <circle cx="8" cy="5" r="3" />
              <path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" />
            </svg>
            Profile
          </a>
        </nav>

        <div class="sidebar-footer">
          <button
            onclick="logout()"
            class="sidebar-item"
            style="
              width: 100%;
              border: none;
              background: none;
              cursor: pointer;
              text-align: left;
            "
          >
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6"
              />
            </svg>
            Logout
          </button>
        </div>
      </aside>

      <main class="dashboard-main">
        <div class="dashboard-main-inner">
          <div class="page-header">
            <h1 class="page-title">User Management</h1>
            <button
              class="btn btn-primary btn-sm"
              onclick="showCreateEmployee()"
            >
              + Add Employee
            </button>
          </div>

          <!-- Role filter tabs -->
          <div class="sa-tabs">
            <button class="sa-tab active" onclick="loadUsers('', this)">
              All
            </button>
            <button class="sa-tab" onclick="loadUsers('student', this)">
              Students
            </button>
            <button class="sa-tab" onclick="loadUsers('expert', this)">
              Experts
            </button>
            <button class="sa-tab" onclick="loadUsers('employee', this)">
              Employees
            </button>
          </div>

          <div id="users-list"></div>

          <!-- Create Employee Modal -->
          <div id="create-employee-modal" class="modal">
            <div class="modal-content">
              <h3 class="modal-title">Add Employee Admin</h3>
              <div class="modal-body">
                <div class="form-group">
                  <label class="label">Name</label>
                  <input
                    id="emp-name"
                    type="text"
                    class="input"
                    placeholder="Full name"
                  />
                </div>
                <div class="form-group">
                  <label class="label">Email</label>
                  <input
                    id="emp-email"
                    type="email"
                    class="input"
                    placeholder="employee@example.com"
                  />
                </div>
                <div class="form-group">
                  <label class="label">Password</label>
                  <div class="password-wrapper">
                    <input
                      id="emp-password"
                      type="password"
                      class="input"
                      placeholder="Min. 8 characters"
                    />
                    <button class="password-toggle" type="button">
                      <svg
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path
                          d="M1 12s4-8 11-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                        ></path>
                        <circle cx="12" cy="12" r="3"></circle>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
              <div class="modal-actions">
                <button class="btn btn-secondary btn-md" onclick="closeModal()">
                  Cancel
                </button>
                <button
                  class="btn btn-primary btn-md"
                  onclick="createEmployee()"
                >
                  Create Account
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/utils.js"></script>
    <script>
      if (!requireRole("super_admin")) throw new Error("Abort");
      document.querySelector('[data-page="users"]')?.classList.add("active");

      async function loadUsers(role = "", activeTab = null) {
        if (activeTab) {
          document
            .querySelectorAll(".sa-tab")
            .forEach((t) => t.classList.remove("active"));
          activeTab.classList.add("active");
        }

        const url = role
          ? `/superadmin/users?role=${role}`
          : "/superadmin/users";
        const res = await apiFetch(url);
        const users = await res.json();
        const list = document.getElementById("users-list");

        if (!users.length) {
          list.innerHTML = `<div class="empty-state"><h3>No users found</h3></div>`;
          return;
        }

        list.innerHTML = `
      <div class="sa-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${users
              .map(
                (u) => `
              <tr id="user-row-${u._id}">
                <td>${escapeHtml(u.email)}</td>
                <td><span class="badge badge-${roleBadge(u.role)}">${u.role}</span></td>
                <td>
                  ${
                    u.is_banned
                      ? `<span class="badge badge-refunded">Banned</span>`
                      : `<span class="badge badge-completed">Active</span>`
                  }
                </td>
                <td>${formatDate(u.created_at)}</td>
                <td>
                  <div style="display:flex;gap:var(--space-2)">
                    ${
                      u.is_banned
                        ? `<button class="btn btn-secondary btn-sm" onclick="toggleBan('${u._id}', false, this)">Unban</button>`
                        : `<button class="btn btn-secondary btn-sm" onclick="toggleBan('${u._id}', true, this)">Ban</button>`
                    }
                    <button class="btn btn-ghost btn-sm" style="color:var(--color-danger)"
                      onclick="deleteUser('${u._id}', '${u.role}', this)">Delete</button>
                  </div>
                </td>
              </tr>`,
              )
              .join("")}
          </tbody>
        </table>
      </div>`;
      }

      function roleBadge(role) {
        return (
          {
            student: "progress",
            expert: "reviewing",
            employee: "pending",
            super_admin: "completed",
          }[role] || "awaiting"
        );
      }

      async function toggleBan(userId, ban, btn) {
        btn.disabled = true;
        const endpoint = ban
          ? `/superadmin/users/${userId}/ban`
          : `/superadmin/users/${userId}/unban`;

        const res = await apiFetch(endpoint, { method: "POST" });
        if (res.ok) {
          toast(
            `User ${ban ? "banned" : "unbanned"}.`,
            ban ? "warning" : "success",
          );
          loadUsers();
        } else {
          btn.disabled = false;
          toast("Action failed.", "error");
        }
      }

      async function deleteUser(userId, role, btn) {
        if (
          !confirm(
            `Permanently delete this ${role} account? This cannot be undone.`,
          )
        )
          return;
        btn.disabled = true;
        const res = await apiFetch(`/superadmin/users/${userId}`, {
          method: "DELETE",
        });
        if (res.ok) {
          document.getElementById(`user-row-${userId}`)?.remove();
          toast("User deleted.");
        } else {
          btn.disabled = false;
          toast("Delete failed.", "error");
        }
      }

      // Create employee modal
      function showCreateEmployee() {
        document
          .getElementById("create-employee-modal")
          .classList.add("active");
      }
      function closeModal() {
        document
          .getElementById("create-employee-modal")
          .classList.remove("active");
        // Clear inputs
        document.getElementById("emp-name").value = "";
        document.getElementById("emp-email").value = "";
        document.getElementById("emp-password").value = "";
      }

      async function createEmployee() {
        const name = document.getElementById("emp-name").value.trim();
        const email = document.getElementById("emp-email").value.trim();
        const password = document.getElementById("emp-password").value;

        if (!name || !email || !password) {
          toast("All fields are required.", "error");
          return;
        }

        const res = await apiFetch("/superadmin/employees/create", {
          method: "POST",
          body: JSON.stringify({ name, email, password }),
        });

        if (res.ok) {
          closeModal();
          toast("Employee account created successfully.");
          loadUsers("employee");
        } else {
          const d = await res.json();
          toast(d.error || "Creation failed.", "error");
        }
      }

      loadUsers();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/js/notifications.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TutorSolve</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/public.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>

<body class="auth-body">
  <header class="header">
    <div class="nav-inner">
      <a href="/index.html" class="logo">
        <img src="/assets/logo.svg" alt="TutorSolve">
        <span>TutorSolve</span>
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="/index.html#how-it-works" class="nav-link">How it Works</a></li>
          <li><a href="/index.html#our-services" class="nav-link">Our Services</a></li>
          <li><a href="/pages/ask-question.html" class="nav-link">Ask a Question</a></li>
          <li><a href="/pages/experts.html" class="nav-link">Our Experts</a></li>
          <li><a href="/index.html#testimonials" class="nav-link">Reviews</a></li>
        </ul>
      </nav>
      <div class="nav-actions" id="nav-actions"></div>
      <div class="nav-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-shell">
      <div class="auth-layout">
        <section class="auth-form-panel">
          <h2 class="auth-title">Log In</h2>
          <p class="auth-sub">Welcome back.</p>
          <div class="form-group">
            <label class="label">Email</label>
            <input id="email" type="email" class="input" placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label class="label">Password</label>
            <div class="password-wrapper">
              <input id="password" type="password" class="input" placeholder="••••••••">
              <button class="password-toggle" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>
          <p style="margin:-4px 0 14px; text-align:right; font-size:14px;">
            <a href="#" id="forgot-password-link">Forgot password?</a>
          </p>
          <button id="login-btn" class="btn btn-primary btn-lg" style="width:100%">Log In</button>
          <p class="auth-footer">
            No account? <a href="/auth/signup.html">Sign Up</a> ·
            <a href="/auth/expert-apply.html">Become an Expert</a>
          </p>
        </section>
      </div>
    </div>
  </main>
  <script src="/js/runtime-env.js"></script>
  <script src="/js/runtime-config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/landing.js"></script>
  <script>
    document.getElementById("login-btn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      try {
        await login(email, password);
      } catch (e) {
        toast(e.message, "error");
      }
    });

    document.getElementById("forgot-password-link").addEventListener("click", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (!email) {
        toast("Enter your email first, then click Forgot password.", "info");
        return;
      }

      try {
        const result = await forgotPassword(email);
        toast(result.message || "If this email exists, a reset link was sent.", "success");
      } catch (err) {
        toast(err.message || "Failed to send reset email.", "error");
      }
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Board — TutorSolve Expert</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/expert.css">
</head>

<body>
  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="/index.html" class="sidebar-logo">
        <img src="/assets/logo.svg" alt="TutorSolve" width="28">
        <span class="navbar-logo-text">TutorSolve</span>
      </a>

      <nav class="sidebar-nav">
        <p class="sidebar-section-label">Menu</p>
        <a href="/expert/dashboard.html" class="sidebar-item" data-page="dashboard">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="6" height="6" rx="1" />
            <rect x="9" y="1" width="6" height="6" rx="1" />
            <rect x="1" y="9" width="6" height="6" rx="1" />
            <rect x="9" y="9" width="6" height="6" rx="1" />
          </svg>
          Dashboard
        </a>
        <a href="/expert/job-board.html" class="sidebar-item" data-page="job-board">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 4h12M2 8h8M2 12h10" />
          </svg>
          Job Board
        </a>
        <a href="/expert/my-tasks.html" class="sidebar-item" data-page="my-tasks">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 4h8M4 8h5M3 12l2 2 4-4" />
          </svg>
          My Tasks
        </a>
        <a href="/expert/profile.html" class="sidebar-item" data-page="profile">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="5" r="3" />
            <path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" />
          </svg>
          Profile
        </a>
      </nav>

      <div class="sidebar-footer">
        <button onclick="logout()" class="sidebar-item"
          style="width:100%;border:none;background:none;cursor:pointer;text-align:left">
          <svg class="sidebar-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" />
          </svg>
          Logout
        </button>
      </div>
    </aside>

    <main class="dashboard-main">
      <div class="dashboard-main-inner">

        <div class="page-header">
          <div>
            <h1 class="page-title">Job Board</h1>
            <p class="page-subtitle">Questions available in your domain</p>
          </div>
          <div style="display: flex; align-items: center;">
            <div id="notif-bell">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
              <div id="notif-badge">0</div>
              <div id="notif-dropdown">
                <div id="notif-list"></div>
              </div>
            </div>
            <button onclick="loadJobs()" class="btn btn-secondary btn-sm">↻ Refresh</button>
          </div>
        </div>

        <div class="tabs-nav">
          <button class="tab-btn active" onclick="switchTab('available')" id="tab-available">Available Jobs</button>
          <button class="tab-btn" onclick="switchTab('applied')" id="tab-applied">Applied Jobs</button>
        </div>

        <div id="jobs-container">
          <div class="empty-state">
            <p>Loading jobs...</p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Job Details Modal -->
  <div class="modal" id="job-details-modal">
    <div class="modal-content" style="max-width: 600px; width: 90%;">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;">
        <div>
          <h2 id="modal-job-title" style="margin-bottom: 8px;"></h2>
          <div id="modal-job-badges" style="display:flex;gap:var(--space-2);flex-wrap:wrap"></div>
        </div>
        <button class="btn btn-ghost btn-sm"
          onclick="document.getElementById('job-details-modal').classList.remove('active')">✕</button>
      </div>
      <div style="margin-bottom: 24px;">
        <h4 style="margin-bottom: 8px; font-size: 14px; color: var(--color-gray-500);">Description</h4>
        <p id="modal-job-desc"
          style="font-size: 15px; color: var(--color-gray-800); line-height: 1.6; white-space: pre-wrap;"></p>
      </div>
      <div style="margin-bottom: 24px;">
        <h4 style="margin-bottom: 8px; font-size: 14px; color: var(--color-gray-500);">Attached Files</h4>
        <div id="modal-job-files" style="display:flex; flex-direction:column; gap:8px;">
          <p style="font-size: 13px; color: var(--color-gray-500);">Loading files...</p>
        </div>
      </div>
      <div id="modal-job-actions"
        style="display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--color-gray-200); padding-top: 16px;">
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/notifications.js"></script>
  <script>
    if (!requireRole("expert")) throw new Error("Abort");
    document.querySelector('[data-page="job-board"]')?.classList.add("active");

    function showSkeleton() {
      document.getElementById("jobs-container").innerHTML = `
      <div class="empty-state">
        <p>Loading jobs...</p>
      </div>`;
    }

    function showKYCBlock(status) {
      document.getElementById("jobs-container").innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="var(--color-gray-300)" stroke-width="1.5" style="margin-bottom:16px;">
          <circle cx="24" cy="24" r="20"/>
          <path d="M24 16v8M24 30v2"/>
        </svg>
        <h3>Job Board Locked</h3>
        <p>Your KYC application is ${status === "rejected" ? "rejected" : "under review"}. You cannot access the job board until approved.</p>
      </div>`;
    }

    let currentTab = "available";
    let allJobsData = {};

    function truncateWords(str, numWords) {
      if (!str) return "";
      const words = str.split(/\\s+/);
      if (words.length <= numWords) return str;
      return words.slice(0, numWords).join(" ") + "...";
    }

    function renderJobs(jobs) {
      const container = document.getElementById("jobs-container");

      if (jobs.length === 0) {
        container.innerHTML = `
        <div class="empty-state">
          <h3>No ${currentTab} jobs</h3>
          <p>${currentTab === "available"
            ? "There are no open questions in your domain right now. Check back soon."
            : "You haven't applied for any jobs yet."}</p>
        </div>`;
        return;
      }

      allJobsData = {};

      container.innerHTML = jobs.map(job => {
        allJobsData[job._id] = job;

        let buttonsHtml = '';
        if (currentTab === "available") {
          buttonsHtml = `
            <button class="btn btn-secondary btn-sm" onclick="openJobDetails('${job._id}')">View Details</button>
            <button class="btn btn-primary btn-sm interest-btn" id="btn-${job._id}" onclick="expressInterest('${job._id}', this)">I'm Interested</button>
          `;
        } else {
          let withdrawHtml = '';
          if (job.app_status === "Interested") {
            withdrawHtml = `<button class="btn btn-secondary btn-sm" style="color:var(--color-danger); border-color:var(--color-danger);" id="btn-withdraw-${job._id}" onclick="withdrawInterest('${job._id}', this)">Withdraw</button>`;
          }
          buttonsHtml = `
            <button class="btn btn-secondary btn-sm" onclick="openJobDetails('${job._id}')">View Details</button>
            ${withdrawHtml}
          `;
        }

        const truncatedDesc = job.description ? truncateWords(job.description, 25) : "No description provided.";

        return `
      <div class="card card-interactive job-card" id="job-${job._id}">
        <div class="job-card-content">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap: 16px;">
            <h3 class="job-title" style="font-size: 18px; font-weight: 600; color: var(--color-gray-900);">${escapeHtml(job.title)}</h3>
            ${job.app_status ? `<span class="badge badge-status-${job.app_status.toLowerCase().replace(/ /g, '-')}">${escapeHtml(job.app_status)}</span>` : ""}
          </div>
          
          <div class="job-meta">
            <div class="meta-pill">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
              <span>${escapeHtml(job.domain)}</span>
            </div>
            ${job.deadline ? `
            <div class="meta-pill" style="color: var(--color-danger);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span>Due ${formatDate(job.deadline)}</span>
            </div>
            ` : ""}
            <div class="meta-pill">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span>Posted ${timeAgo(job.created_at)}</span>
            </div>
          </div>

          <p class="job-description">${escapeHtml(truncatedDesc).replace(/\n/g, '<br>')}</p>
        </div>
        
        <div class="job-footer">
          <div style="font-size: 13px; color: var(--color-gray-500); font-weight: 500;">
            ${job.files_count || 0} attachments
          </div>
          <div style="display:flex; gap:8px;">
            ${buttonsHtml}
          </div>
        </div>
      </div>
    `}).join("");
    }

    async function switchTab(tab) {
      if (currentTab === tab) return;
      currentTab = tab;

      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');

      loadJobs();
    }

    async function loadJobs() {
      showSkeleton();
      try {
        const endpoint = currentTab === "available" ? "/expert/jobs" : "/expert/jobs/applied";
        const res = await apiFetch(endpoint);

        if (res.status === 403) {
          const data = await res.json();
          showKYCBlock(data.kyc_status);
          return;
        }

        const jobs = await res.json();
        renderJobs(jobs);
      } catch (e) {
        document.getElementById("jobs-container").innerHTML = `
        <div class="empty-state">
          <h3>Failed to load job board</h3>
          <p>An error occurred fetching jobs. Please try refreshing.</p>
        </div>`;
      }
    }

    async function expressInterest(questionId, btn) {
      btn.disabled = true;
      btn.textContent = "Registering...";

      try {
        const res = await apiFetch(`/expert/jobs/${questionId}/interest`, { method: "POST" });

        if (res.ok) {
          btn.textContent = "✓ Interested";
          btn.style.background = "var(--color-success)";
          btn.style.boxShadow = "none";
          toast("Interest registered! Admin will be notified.");

          // Remove from available list after a delay if we are in available tab
          if (currentTab === "available") {
            setTimeout(() => {
              const card = document.getElementById(`job-${questionId}`);
              if (card) {
                card.style.opacity = '0';
                card.style.transform = 'translateY(-10px)';
                card.style.transition = 'all 0.4s ease';
                setTimeout(() => {
                  card.remove();
                  document.getElementById('job-details-modal').classList.remove('active');
                }, 400);
              }
            }, 800);
          } else {
            loadJobs();
            document.getElementById('job-details-modal').classList.remove('active');
          }
        } else {
          btn.disabled = false;
          btn.textContent = "I'm Interested";
          toast("Something went wrong. Try again.", "error");
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = "I'm Interested";
        toast("Something went wrong. Try again.", "error");
      }
    }

    async function withdrawInterest(questionId, btn) {
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Withdrawing...";
      }

      try {
        const res = await apiFetch(`/expert/jobs/${questionId}/interest`, { method: "DELETE" });

        if (res.ok) {
          toast("Interest withdrawn successfully.");

          setTimeout(() => {
            const card = document.getElementById(`job-${questionId}`);
            if (card) {
              card.style.opacity = '0';
              card.style.transform = 'translateY(-10px)';
              card.style.transition = 'all 0.4s ease';
              setTimeout(() => {
                card.remove();
                document.getElementById('job-details-modal').classList.remove('active');
              }, 400);
            }
          }, 400);
        } else {
          const d = await res.json();
          if (btn) {
            btn.disabled = false;
            btn.textContent = "Withdraw";
          }
          toast(d.error || "Cannot withdraw interest.", "error");
        }
      } catch (e) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = "Withdraw";
        }
        toast("Network error. Try again.", "error");
      }
    }

    async function openJobDetails(questionId) {
      const job = allJobsData[questionId];
      if (!job) return;

      document.getElementById('modal-job-title').textContent = job.title;
      document.getElementById('modal-job-desc').textContent = job.description || "No description provided.";

      let badgesHtml = `<span class="badge badge-progress">${escapeHtml(job.domain)}</span>`;
      if (job.deadline) badgesHtml += `<span class="badge badge-awaiting">Due ${formatDate(job.deadline)}</span>`;
      badgesHtml += `<span class="badge badge-awaiting">Posted ${timeAgo(job.created_at)}</span>`;
      if (job.app_status) badgesHtml += `<span class="badge badge-status-${job.app_status.toLowerCase().replace(/ /g, '-')}">${escapeHtml(job.app_status)}</span>`;

      document.getElementById('modal-job-badges').innerHTML = badgesHtml;

      const actionsContainer = document.getElementById('modal-job-actions');
      if (currentTab === "available") {
        actionsContainer.innerHTML = `<button class="btn btn-primary" onclick="expressInterest('${job._id}', this)">I'm Interested</button>`;
      } else {
        let withdrawHtml = '';
        if (job.app_status === "Interested") {
          withdrawHtml = `<button class="btn btn-secondary" style="color:var(--color-danger); border-color:var(--color-danger);" onclick="withdrawInterest('${job._id}', this)">Withdraw Interest</button>`;
        }
        actionsContainer.innerHTML = withdrawHtml;
      }

      document.getElementById('job-details-modal').classList.add('active');

      // Fetch files
      const filesContainer = document.getElementById('modal-job-files');
      filesContainer.innerHTML = `<p style="font-size: 13px; color: var(--color-gray-500);">Loading files...</p>`;

      try {
        const res = await apiFetch(`/files/question/${questionId}`);
        if (res.ok) {
          const files = await res.json();
          const studentFiles = files.filter(f => f.category === "attachment" || f.uploader_type === "student");

          if (studentFiles.length === 0) {
            filesContainer.innerHTML = `<p style="font-size: 13px; color: var(--color-gray-500);">No files attached.</p>`;
          } else {
            filesContainer.innerHTML = studentFiles.map(f => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding: 12px; border: 1px solid var(--color-gray-300); border-radius: var(--radius-md);">
                        <div>
                            <div style="font-weight: 500; font-size: 14px;">${escapeHtml(f.original_filename)}</div>
                            <div style="font-size: 12px; color: var(--color-gray-500); margin-top: 2px;">
                                ${f.file_type.toUpperCase()}
                            </div>
                        </div>
                        <button class="btn btn-secondary btn-sm" onclick="downloadFile('${f._id}')">View</button>
                    </div>
                  `).join("");
          }
        } else {
          filesContainer.innerHTML = `<p style="font-size: 13px; color: var(--color-danger);">Failed to load files.</p>`;
        }
      } catch (e) {
        filesContainer.innerHTML = `<p style="font-size: 13px; color: var(--color-danger);">Network error loading files.</p>`;
      }
    }

    async function downloadFile(fileId) {
      const res = await apiFetch(`/files/${fileId}/url`);
      const data = await res.json();
      if (res.ok) {
        window.open(data.url, "_blank");
      } else {
        toast("Error getting file URL", "error");
      }
    }

    loadJobs();
  </script>
</body>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Dashboard — TutorSolve</title>
    <link rel="stylesheet" href="/css/base.css" />
    <style>
      .dashboard-layout {
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      .main-content {
        flex: 1;
        padding: 32px;
        overflow-y: auto;
        background: var(--color-gray-50);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: #fff;
        padding: 20px;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--color-gray-300);
      }

      .stat-value {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-gray-900);
      }

      .stat-label {
        font-size: 14px;
        color: var(--color-gray-500);
      }

      .profile-card {
        background: #fff;
        padding: 20px;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        margin-bottom: 32px;
        border: 1px solid var(--color-gray-300);
      }

      .order-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .order-card {
        background: #fff;
        padding: 20px;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--color-gray-300);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .badge {
        padding: 4px 8px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 500;
      }

      .badge-awaiting {
        background: #fffbeb;
        color: #92400e;
      }

      .badge-pending_payment {
        background: #eff6ff;
        color: #1e40af;
      }

      .badge-in_progress {
        background: #ecfdf5;
        color: #065f46;
      }

      .badge-reviewing {
        background: #fef2f2;
        color: #991b1b;
      }

      .badge-completed {
        background: #ecfdf5;
        color: #065f46;
      }
    </style>
  </head>

  <body>
    <div class="dashboard-layout">
      <aside class="sidebar">
        <a href="/index.html" class="sidebar-logo">
          <img src="/assets/logo.svg" alt="TutorSolve" width="28" />
          <span class="navbar-logo-text">TutorSolve</span>
        </a>

        <nav class="sidebar-nav">
          <p class="sidebar-section-label">Menu</p>
          <a
            href="/student/dashboard.html"
            class="sidebar-item"
            data-page="dashboard"
          >
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <rect x="1" y="1" width="6" height="6" rx="1" />
              <rect x="9" y="1" width="6" height="6" rx="1" />
              <rect x="1" y="9" width="6" height="6" rx="1" />
              <rect x="9" y="9" width="6" height="6" rx="1" />
            </svg>
            Dashboard
          </a>
          <a
            href="/student/orders.html"
            class="sidebar-item"
            data-page="orders"
          >
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M4 4h8M4 8h5M3 12l2 2 4-4" />
            </svg>
            My Orders
          </a>
          <a href="/student/feed.html" class="sidebar-item" data-page="feed">
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <circle cx="8" cy="8" r="7" />
              <path
                d="M1.5 8h13M8 1c2.5 0 4 3.5 4 7s-1.5 7-4 7-4-3.5-4-7 1.5-7 4-7z"
              />
            </svg>
            Global Feed
          </a>
          <a
            href="/student/profile.html"
            class="sidebar-item"
            data-page="profile"
          >
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <circle cx="8" cy="5" r="3" />
              <path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" />
            </svg>
            Profile
          </a>
        </nav>

        <div class="sidebar-footer">
          <button
            onclick="logout()"
            class="sidebar-item"
            style="
              width: 100%;
              border: none;
              background: none;
              cursor: pointer;
              text-align: left;
            "
          >
            <svg
              class="sidebar-icon"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6"
              />
            </svg>
            Logout
          </button>
        </div>
      </aside>
      <div class="main-content">
        <!-- Header Strip -->
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: white;
            padding: 16px 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-gray-300);
            box-shadow: var(--shadow-sm);
          "
        >
          <div>
            <h1
              style="
                font-size: 20px;
                margin-bottom: 4px;
                color: var(--color-gray-900);
              "
            >
              Welcome back, <span id="p-name">Loading...</span>
            </h1>
            <p
              id="p-degree"
              style="color: var(--color-gray-500); font-size: 14px; margin: 0"
            ></p>
          </div>
          <div style="display: flex; align-items: center; gap: 16px">
            <div id="notif-bell">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
              <div id="notif-badge">0</div>
              <div id="notif-dropdown">
                <div id="notif-list"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Stat Cards -->
        <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr)">
          <div class="stat-card">
            <div class="stat-label">Total Orders</div>
            <div class="stat-value" id="s-orders">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Spent</div>
            <div class="stat-value" id="s-spent">₹0.00</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Active Orders</div>
            <div class="stat-value" id="s-active">-</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pending Payment</div>
            <div class="stat-value" id="s-pending">-</div>
          </div>
        </div>

        <!-- Charts -->
        <div
          style="
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
            margin-bottom: 32px;
          "
        >
          <div class="card">
            <h3
              style="
                margin-bottom: 16px;
                font-size: 16px;
                font-weight: 600;
                color: var(--color-gray-900);
              "
            >
              Orders by Status
            </h3>
            <div class="chart-wrapper">
              <canvas id="statusChart"></canvas>
              <div id="statusChart-loading" class="chart-loading">
                Loading...
              </div>
            </div>
          </div>
          <div class="card">
            <h3
              style="
                margin-bottom: 16px;
                font-size: 16px;
                font-weight: 600;
                color: var(--color-gray-900);
              "
            >
              Monthly Spending
            </h3>
            <div class="chart-wrapper">
              <canvas id="spendingChart"></canvas>
              <div id="spendingChart-loading" class="chart-loading">
                Loading...
              </div>
            </div>
          </div>
        </div>

        <!-- Recent Orders Table -->
        <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 16px">
          Recent Orders
        </h2>
        <div class="card" style="padding: 0; overflow: hidden">
          <table
            style="
              width: 100%;
              border-collapse: collapse;
              text-align: left;
              font-size: 14px;
            "
          >
            <thead>
              <tr
                style="
                  background: var(--color-gray-50);
                  border-bottom: 1px solid var(--color-gray-200);
                "
              >
                <th
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    color: var(--color-gray-700);
                  "
                >
                  Question Title
                </th>
                <th
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    color: var(--color-gray-700);
                  "
                >
                  Domain
                </th>
                <th
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    color: var(--color-gray-700);
                  "
                >
                  Status
                </th>
                <th
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    color: var(--color-gray-700);
                  "
                >
                  Price
                </th>
                <th
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    color: var(--color-gray-700);
                  "
                >
                  Date Posted
                </th>
                <th
                  style="
                    padding: 12px 16px;
                    font-weight: 600;
                    color: var(--color-gray-700);
                    text-align: right;
                  "
                >
                  Action
                </th>
              </tr>
            </thead>
            <tbody id="recent-orders-table">
              <tr>
                <td
                  colspan="6"
                  style="
                    padding: 16px;
                    text-align: center;
                    color: var(--color-gray-500);
                  "
                >
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/notifications.js"></script>
    <script>
      if (!requireRole("student")) throw new Error("Abort");

      async function loadDashboard() {
        try {
          const [dashRes, ordersRes, chartsRes] = await Promise.all([
            apiFetch("/student/dashboard"),
            apiFetch("/student/orders"),
            apiFetch("/student/dashboard/charts"),
          ]);

          const dashData = await dashRes.json();
          const ordersData = await ordersRes.json();
          const chartsData = await chartsRes.json();

          // Header Strip
          document.getElementById("p-name").textContent = dashData.name;
          document.getElementById("p-degree").textContent = dashData.degree
            ? `· ${dashData.degree}`
            : "";

          // Stats
          document.getElementById("s-orders").textContent =
            dashData.total_orders || ordersData.length;

          let totalSpent = 0;
          chartsData.monthly_spending.forEach((m) => (totalSpent += m.spent));
          document.getElementById("s-spent").textContent =
            `₹${totalSpent.toFixed(2)}`;

          const activeOrders = ordersData.filter((o) =>
            ["in_progress", "reviewing"].includes(o.status),
          ).length;
          const pendingPayment = ordersData.filter(
            (o) => o.status === "pending_payment",
          ).length;
          document.getElementById("s-active").textContent = activeOrders;
          document.getElementById("s-pending").textContent = pendingPayment;

          // Recent Orders Table
          const tbody = document.getElementById("recent-orders-table");
          tbody.innerHTML = "";
          if (ordersData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="padding: 16px; text-align: center; color: var(--color-gray-500);">No orders yet. Start by posting a question!</td></tr>`;
          } else {
            ordersData.slice(0, 5).forEach((o) => {
              const tr = document.createElement("tr");
              tr.style.borderBottom = "1px solid var(--color-gray-200)";
              tr.innerHTML = `
              <td style="padding: 12px 16px; font-weight: 500;">
                <a href="/student/order-detail.html?id=${o._id}" style="color: var(--color-gray-900); text-decoration: none;">
                  ${o.title.length > 40 ? escapeHtml(o.title.substring(0, 40)) + "..." : escapeHtml(o.title)}
                </a>
              </td>
              <td style="padding: 12px 16px;"><span class="badge" style="background: var(--color-gray-100); color: var(--color-gray-700);">${escapeHtml(o.domain)}</span></td>
              <td style="padding: 12px 16px;"><span class="badge badge-${o.status}">${formatStatus(o.status)}</span></td>
              <td style="padding: 12px 16px;">${o.price_approved ? "₹" + (o.student_price || 0) : "—"}</td>
              <td style="padding: 12px 16px;">${formatDate(o.created_at)}</td>
              <td style="padding: 12px 16px; text-align: right;">
                <a href="/student/order-detail.html?id=${o._id}" class="btn btn-secondary btn-sm">Open</a>
              </td>
            `;
              tbody.appendChild(tr);
            });
          }

          // Render Charts
          renderStudentCharts(chartsData);
        } catch (e) {
          console.error(e);
          toast("Failed to load dashboard data.", "error");
          document.getElementById("statusChart-loading").innerHTML =
            `<div class="chart-error">Could not load chart data.<button onclick="loadDashboard()">Retry</button></div>`;
          document.getElementById("spendingChart-loading").innerHTML =
            `<div class="chart-error">Could not load chart data.<button onclick="loadDashboard()">Retry</button></div>`;
        }
      }
      loadDashboard();

      // ── Chart Rendering ──────────────────────────────────────
      function renderStudentCharts(data) {
        document.getElementById("statusChart-loading").style.display = "none";
        document.getElementById("spendingChart-loading").style.display = "none";

        const obs = data.orders_by_status || {};
        const statusLabels = [
          "Awaiting Quote",
          "Pending Payment",
          "In Progress",
          "Under Review",
          "Completed",
          "Refunded",
        ];
        const statusData = [
          obs.awaiting_quote || 0,
          obs.pending_payment || 0,
          obs.in_progress || 0,
          obs.reviewing || 0,
          obs.completed || 0,
          (obs.refunded || 0) + (obs.cancelled || 0),
        ];

        // Edge case: empty orders
        if (statusData.reduce((a, b) => a + b, 0) === 0) {
          const ctx = document.getElementById("statusChart").getContext("2d");
          ctx.font = "14px 'Montserrat'";
          ctx.fillStyle = "#6B7280";
          ctx.textAlign = "center";
          ctx.fillText("Post your first question", 150, 120);
        } else {
          new Chart(document.getElementById("statusChart"), {
            type: "doughnut",
            data: {
              labels: statusLabels,
              datasets: [
                {
                  data: statusData,
                  backgroundColor: [
                    CHART_COLORS.awaiting_quote,
                    CHART_COLORS.pending_payment,
                    CHART_COLORS.in_progress,
                    CHART_COLORS.reviewing,
                    CHART_COLORS.completed,
                    CHART_COLORS.refunded,
                  ],
                  borderWidth: 0,
                  hoverOffset: 4,
                },
              ],
            },
            options: {
              ...chartDefaults,
              cutout: "70%",
              plugins: {
                ...chartDefaults.plugins,
                legend: {
                  position: "bottom",
                  labels: {
                    ...chartDefaults.plugins.legend.labels,
                    boxWidth: 12,
                    padding: 15,
                  },
                },
              },
            },
          });
        }

        const spend = data.monthly_spending || [];
        const spendLabels = spend.map((s) => s.month);
        const spendData = spend.map((s) => s.spent);

        new Chart(document.getElementById("spendingChart"), {
          type: "bar",
          data: {
            labels: spendLabels,
            datasets: [
              {
                label: "Amount Spent (₹)",
                data: spendData,
                backgroundColor: CHART_COLORS.brandPrimary,
                borderRadius: 4,
                barPercentage: 0.6,
              },
            ],
          },
          options: {
            ...chartDefaults,
            scales: {
              y: {
                beginAtZero: true,
                ticks: { callback: (value) => "₹" + value },
              },
              x: {
                grid: { display: false },
              },
            },
            plugins: {
              ...chartDefaults.plugins,
              tooltip: {
                ...chartDefaults.plugins.tooltip,
                callbacks: {
                  label: (context) =>
                    `₹${context.raw.toFixed(2)} spent in ${context.label}`,
                },
              },
            },
          },
        });
      }
    </script>

    <script>
      document
        .querySelector('[data-page="dashboard"]')
        ?.classList.add("active");
    </script>
  </body>
</html>
